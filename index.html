<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Critical Path Optimizations -->
    <!-- [POST_BUILD_INJECT_PRELOADS] -->
    
    <!-- CSS is loaded asynchronously by the postBuildAdjustments plugin at build time.
         In dev mode, Vite injects CSS normally. -->

    <!-- Primary Meta Tags (overridden dynamically per page by useSEO hook) -->
    <title>Türk Avukat Mannheim | Avukat Mannheim | Avukat Hasan Doğru</title>
    <meta name="description" content="Türkischer Anwalt in Mannheim für türkisches Recht. Avukat Hasan Doğru berät türkischstämmige Familien in Mannheim zu Scheidung, Erbrecht und türkischem Familienrecht — ohne Reise in die Türkei." />
    <meta name="robots" content="index, follow" />

    <!-- Hreflang (defaults, overridden per page) -->
    <link rel="alternate" hreflang="de" href="https://www.hasandogru.de/de" />
    <link rel="alternate" hreflang="tr" href="https://www.hasandogru.de/tr" />
    <link rel="alternate" hreflang="x-default" href="https://www.hasandogru.de/de" />

    <!-- Canonical (overridden per page) -->
    <link rel="canonical" href="https://www.hasandogru.de/de" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Doğru Kanzlei" />
    <meta property="og:title" content="Türk Avukat Mannheim | Avukat Mannheim | Avukat Hasan Doğru" />
    <meta property="og:description" content="Türkischer Anwalt in Mannheim für türkisches Recht. Avukat Hasan Doğru berät türkischstämmige Familien in Mannheim zu Scheidung, Erbrecht und türkischem Familienrecht — ohne Reise in die Türkei." />
    <meta property="og:url" content="https://www.hasandogru.de" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:locale:alternate" content="tr_TR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Türk Avukat Mannheim | Avukat Mannheim | Avukat Hasan Doğru" />
    <meta name="twitter:description" content="Türkischer Anwalt in Mannheim für türkisches Recht. Avukat Hasan Doğru berät türkischstämmige Familien in Mannheim zu Scheidung, Erbrecht und türkischem Familienrecht — ohne Reise in die Türkei." />

    <!-- Geo Tags (Local SEO) -->
    <meta name="geo.region" content="DE-BW" />
    <meta name="geo.placename" content="Mannheim" />

    <!-- Resource Hints -->
    <link rel="preload" href="/src/assets/fonts/Inter.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    <link rel="preload" href="/src/assets/fonts/CormorantGaramond-Regular.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    
    <!-- Critical CSS: inline above-the-fold styles so the page background renders immediately.
         Ensures LCP text (h1 and p) is visible white/gold instantly without waiting for async CSS. -->
    <style>
      :root { --brand-green: #1C3829; --brand-gold: #B8963E; }
      body { background: var(--brand-green); margin: 0; padding: 0; font-family: sans-serif; overflow-x: hidden; color: white; }
      #root { min-height: 100vh; background: var(--brand-green); }
      header { position: fixed; top: 0; width: 100%; height: 80px; z-index: 100; transition: background 0.3s; }
      .hero-instant { background: var(--brand-green); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
      
      /* LCP Text Styles (Critical for reducing PSI render delay) */
      .font-serif { font-family: 'Cormorant Garamond', serif; }
      .font-sans { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
      h1 { color: white; margin-bottom: 2rem; letter-spacing: -0.025em; line-height: 1; }
      .text-white\/80 { color: rgba(255, 255, 255, 0.8); }
      .text-white\/60 { color: rgba(255, 255, 255, 0.6); }
      .max-w-md { max-width: 28rem; }
      .leading-relaxed { line-height: 1.625; }
      .italic { font-style: italic; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" defer></script>
  </body>
</html>
