<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Task 6: Preload LCP Hero Image (First Tag in Head) -->     
    <link rel="preload" as="image" href="/assets/hero.avif" fetchPriority="high" type="image/avif" />

    <!-- Task 2: Async CSS - Build-time injected -->
    <link rel="preload" href="/src/styles/index.css" as="style" onload="this.onload=null;this.rel='stylesheet'">  
    <noscript><link rel="stylesheet" href="/src/styles/index.css"></noscript>

    <!-- Cormorant font: fully deferred via print media trick to break critical path chain -->
    <link rel="stylesheet" href="/src/styles/cormorant-fonts.css" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="/src/styles/cormorant-fonts.css"></noscript>

    <!-- Primary Meta Tags (overridden dynamically per page by useSEO hook) -->
    <title>Avukat Hasan Doğru | Doğru Kanzlei Mannheim</title>
    <meta name="description" content="Avukat Hasan Doğru für türkisches und deutsches Recht in Mannheim. Familienrecht, Erbrecht, Mietrecht, Strafrecht und grenzüberschreitende Rechtsberatung. Kostenlose Erstberatung." />
    <meta name="robots" content="index, follow" />

    <!-- Hreflang (defaults, overridden per page) -->
    <link rel="alternate" hreflang="de" href="https://www.hasandogru.de/de" />
    <link rel="alternate" hreflang="tr" href="https://www.hasandogru.de/tr" />
    <link rel="alternate" hreflang="x-default" href="https://www.hasandogru.de/de" />

    <!-- Canonical (overridden per page) -->
    <link rel="canonical" href="https://www.hasandogru.de/de" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Doğru Kanzlei" />
    <meta property="og:title" content="Avukat Hasan Doğru | Doğru Kanzlei Mannheim" />
    <meta property="og:description" content="Avukat Hasan Doğru für türkisches und deutsches Recht in Mannheim und Ankara." />
    <meta property="og:url" content="https://www.hasandogru.de" />
    <meta property="og:locale" content="de_DE" />
    <meta property="og:locale:alternate" content="tr_TR" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Avukat Hasan Doğru | Doğru Kanzlei" />
    <meta name="twitter:description" content="Avukat Hasan Doğru für türkisches und deutsches Recht in Mannheim und Ankara." />

    <!-- Geo Tags (Local SEO) -->
    <meta name="geo.region" content="DE-BW" />
    <meta name="geo.placename" content="Mannheim" />

    <!-- Resource Hints -->
    <link rel="preload" href="/src/assets/fonts/Inter.woff2" as="font" type="font/woff2" crossorigin="anonymous" />
    
    <!-- Critical CSS (Task 1: Above-the-fold styles) -->
    <style>
      :root { --brand-green: #1C3829; --brand-gold: #B8963E; }
      body { background: var(--brand-green); margin: 0; padding: 0; font-family: sans-serif; overflow-x: hidden; }
      #root { min-height: 100vh; background: var(--brand-green); }
      header { position: fixed; top: 0; width: 100%; height: 80px; z-index: 100; transition: background 0.3s; }
      .hero-instant { background: var(--brand-green); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx" defer></script>
  </body>
</html>
